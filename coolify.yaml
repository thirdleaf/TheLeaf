version: '3.8'

services:
  api:
    image: tradeforge-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      - PORT=3001
      - NODE_ENV=production
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: tradeforge-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
